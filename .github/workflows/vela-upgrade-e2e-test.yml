name: KubeVela Upgrade E2E Test

on:
  push:
    branches:
      - master
      - release-*
  pull_request:
    branches:
      - master
      - release-*
  workflow_dispatch: {}

permissions:
  contents: read

env:
  GO_VERSION: '1.23.8'

jobs:
  upgrade-e2e-tests:
    name: Upgrade E2E Tests (k8s ${{ matrix.k8s-version }})
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    strategy:
      matrix:
        k8s-version: ['v1.29.8']
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.k8s-version }}
      cancel-in-progress: true

    steps:
      # Setup and Dependencies
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install make gcc jq ca-certificates curl gnupg -y
          sudo snap install kubectl --classic
          sudo snap install helm --classic

      - name: Install Go dependencies
        run: go get -v -t -d ./...

      - name: Install test tools
        run: |
          go install sigs.k8s.io/kind@v0.24.0
          go install github.com/onsi/ginkgo/v2/ginkgo@v2.14.0

      # Build Components
      - name: Build vela CLI
        run: make vela-cli

      - name: Build kubectl-vela plugin
        run: make kubectl-vela

      - name: Install kustomize
        run: make kustomize

      # Kubernetes Cluster Setup
      - name: Setup KinD cluster with Kubernetes ${{ matrix.k8s-version }}
        run: |
          kind delete cluster || true
          kind create cluster --image=kindest/node:${{ matrix.k8s-version }}
          kubectl cluster-info

      # KubeVela Installation
      - name: Add KubeVela Helm repository
        run: |
          helm repo add kubevela https://kubevela.github.io/charts
          helm repo update

      - name: Get latest KubeVela release version
        id: get_latest_tag
        run: |
          TAG=$(curl -s https://api.github.com/repos/kubevela/kubevela/releases/latest | jq -r ".tag_name" | awk '{sub(/^v/, ""); print}')
          echo "LATEST_TAG=$TAG" >> $GITHUB_ENV
          echo "Installing KubeVela version: $TAG"

      - name: Install KubeVela ${{ env.LATEST_TAG }}
        run: |
          helm install --create-namespace -n vela-system kubevela kubevela/vela-core \
            --version ${{ env.LATEST_TAG }} \
            --timeout 10m \
            --wait

      - name: Verify KubeVela installation
        run: |
          kubectl get pods -n vela-system
          kubectl rollout status deployment/kubevela-vela-core -n vela-system --timeout=300s
          kubectl get crd applications.core.oam.dev
          ./bin/vela version

      # Build and Upgrade
      - name: Build and load Docker image
        run: |
          mkdir -p $HOME/tmp/
          TMPDIR=$HOME/tmp/ make image-load

      - name: Generate commit hash tag
        id: commit_hash
        run: |
          echo "COMMIT_HASH=git-$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "Generated image tag: git-$(git rev-parse --short HEAD)"

      - name: Upgrade KubeVela to local development image
        run: |
          helm upgrade kubevela ./charts/vela-core \
            --namespace vela-system \
            --set image.repository=vela-core-test \
            --set image.tag=${{ env.COMMIT_HASH }} \
            --set image.pullPolicy=IfNotPresent \
            --timeout 10m \
            --wait \
            --debug

      - name: Verify upgrade completion
        run: |
          ./bin/vela version
          kubectl get pods -n vela-system
          kubectl rollout status deployment/kubevela-vela-core -n vela-system --timeout=300s

      # Test Execution
      - name: Run E2E tests
        run: make test

      # Cleanup
      - name: Cleanup Docker images
        if: ${{ always() }}
        run: |
          make image-cleanup
          docker image prune -f --filter "until=24h"